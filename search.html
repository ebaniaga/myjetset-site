<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>myjetset — Find award flights with your points</title>
<meta name="description" content="Tell us your points and where you want to go. We'll email you award flight options." />
<style>
  :root {
    --ink: #0b1d2a;
    --sky-top: #0a1a2f;
    --sky-mid: #1f3b5c;
    --sky-low: #6ea8c9;
    --ice: #e8f3fb;
    --ice-shadow: #b9d6e8;
    --accent: #ffd27a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    color: var(--ice);
    background: var(--sky-top);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(
      to bottom,
      var(--sky-top) 0%,
      var(--sky-mid) 55%,
      var(--sky-low) 100%
    );
    padding: 6vh 20px 8vh;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .brand {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand .dot { color: var(--accent); }

  .lead {
    margin-top: 0.9rem;
    font-size: clamp(1rem, 2.4vw, 1.15rem);
    font-weight: 300;
    opacity: 0.9;
    line-height: 1.45;
  }

  .card {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.16);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 28px;
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 6px;
  }

  .hint {
    font-size: 0.78rem;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    opacity: 0.6;
  }

  input, select {
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    color: var(--ice);
    padding: 12px 14px;
    font-size: 0.98rem;
    font-family: inherit;
    outline: 0;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.14);
  }

  input::placeholder { color: rgba(232, 243, 251, 0.45); }

  select option { background: var(--sky-mid); color: var(--ice); }

  .row {
    display: flex;
    gap: 14px;
  }
  .row .field { flex: 1; margin-bottom: 18px; }

  .hp {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }

  #submit-btn {
    width: 100%;
    background: var(--accent);
    color: var(--ink);
    border: 0;
    border-radius: 999px;
    padding: 14px 22px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #submit-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(255, 210, 122, 0.35);
  }

  #submit-btn:disabled { opacity: 0.6; cursor: default; }

  /* ---- Date picker ---- */
  .datepicker { position: relative; }

  .dp-trigger {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    color: var(--ice);
    font-size: 0.98rem;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .dp-trigger:hover, .dp-trigger.open {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.14);
  }
  .dp-trigger:focus-visible { border-color: var(--accent); outline: 0; }

  .dp-cal-icon {
    width: 18px; height: 18px;
    flex-shrink: 0;
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
  }
  .dp-text { flex: 1; text-align: left; }
  .dp-text.placeholder { color: rgba(232, 243, 251, 0.45); }

  .dp-clear {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: var(--ice);
    font-size: 1.05rem;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
  }
  .dp-clear:hover { background: rgba(255, 255, 255, 0.28); }
  .dp-clear[hidden] { display: none; }

  .dp-panel {
    position: absolute;
    z-index: 20;
    top: calc(100% + 8px);
    left: 0;
    width: 330px;
    max-width: 100%;
    background: #0e2138;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
  }
  .dp-panel[hidden] { display: none; }

  .dp-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .dp-month { font-weight: 600; font-size: 0.98rem; }

  .dp-nav {
    width: 32px; height: 32px;
    padding: 0;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--ice);
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .dp-nav:hover:not(:disabled) { background: rgba(255, 255, 255, 0.12); }
  .dp-nav:disabled { opacity: 0.25; cursor: default; }

  .dp-dow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .dp-dow span {
    text-align: center;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    opacity: 0.5;
    padding: 4px 0;
  }

  .dp-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .dp-day {
    aspect-ratio: 1 / 1;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: transparent;
    color: var(--ice);
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .dp-day:hover:not(:disabled):not(.selected) { background: rgba(255, 255, 255, 0.12); }
  .dp-day.muted { color: rgba(232, 243, 251, 0.3); }
  .dp-day:disabled { color: rgba(232, 243, 251, 0.18); cursor: default; }
  .dp-day.today:not(.selected) { box-shadow: inset 0 0 0 1px var(--accent); }
  .dp-day.selected {
    background: var(--accent);
    color: var(--ink);
    font-weight: 700;
  }

  .dp-flex {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
  }
  .dp-flex-label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.6;
    margin-bottom: 8px;
  }
  .dp-flex-row { display: flex; gap: 8px; }
  .dp-flex-btn {
    flex: 1;
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 999px;
    background: transparent;
    color: var(--ice);
    padding: 8px 4px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .dp-flex-btn:hover { border-color: var(--accent); }
  .dp-flex-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--ink);
    font-weight: 700;
  }

  .field-error {
    font-size: 0.78rem;
    color: #ffb4b4;
    margin-top: 6px;
    line-height: 1.3;
  }
  .field-error[hidden] { display: none; }

  .chips {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .chip { position: relative; cursor: pointer; }
  .chip input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .chip-label {
    display: block;
    padding: 10px 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    font-size: 0.88rem;
    background: rgba(255, 255, 255, 0.05);
    text-align: center;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .chip:hover .chip-label { border-color: var(--accent); }
  .chip input:checked + .chip-label {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--ink);
    font-weight: 600;
  }
  .chip input:disabled + .chip-label {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .chip input:focus-visible + .chip-label {
    outline: 2px solid rgba(255, 210, 122, 0.4);
    outline-offset: 1px;
  }
  @media (max-width: 460px) {
    .chips { grid-template-columns: 1fr; }
  }

  label.check-inline {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    opacity: 1;
    margin-bottom: 0;
  }
  .check-inline input[type="checkbox"] {
    width: 18px;
    height: 18px;
    padding: 0;
    margin: 0;
    background: transparent;
    border: 0;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }
  input:disabled { opacity: 0.4; cursor: not-allowed; }

  .message {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.45;
  }
  .message[hidden] { display: none; }
  .message.ok {
    background: rgba(120, 210, 170, 0.15);
    border: 1px solid rgba(120, 210, 170, 0.4);
    color: #d6f6e8;
  }
  .message.err {
    background: rgba(230, 130, 130, 0.15);
    border: 1px solid rgba(230, 130, 130, 0.4);
    color: #f6dada;
  }

  footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.78rem;
    opacity: 0.5;
  }

  @media (max-width: 460px) {
    .row { flex-direction: column; gap: 0; }
    .card { padding: 22px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="brand">myjetset<span class="dot">.</span>life</h1>
      <p class="lead">
        Tell us how many points you have and where you'd like to go.
        We'll search award availability and email you the options.
      </p>
    </header>

    <form class="card" id="search-form" novalidate>
      <div class="field">
        <label>Mileage programs <span class="hint">pick up to 3</span></label>
        <div class="chips" id="programs-chips">
          <label class="chip"><input type="checkbox" name="programs" value="aeroplan" /><span class="chip-label">Air Canada Aeroplan</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="aeromexico" /><span class="chip-label">Aeroméxico Club Premier</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="alaska" /><span class="chip-label">Alaska Mileage Plan</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="american" /><span class="chip-label">American AAdvantage</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="azul" /><span class="chip-label">Azul TudoAzul</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="british" /><span class="chip-label">British Airways Club</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="delta" /><span class="chip-label">Delta SkyMiles</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="etihad" /><span class="chip-label">Etihad Guest</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="finnair" /><span class="chip-label">Finnair Plus</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="flyingblue" /><span class="chip-label">Air France-KLM Flying Blue</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="jetblue" /><span class="chip-label">JetBlue TrueBlue</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="qantas" /><span class="chip-label">Qantas Frequent Flyer</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="qatar" /><span class="chip-label">Qatar Privilege Club</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="saudia" /><span class="chip-label">Saudia AlFursan</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="smiles" /><span class="chip-label">GOL Smiles</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="united" /><span class="chip-label">United MileagePlus</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="velocity" /><span class="chip-label">Virgin Australia Velocity</span></label>
          <label class="chip"><input type="checkbox" name="programs" value="virginatlantic" /><span class="chip-label">Virgin Atlantic Flying Club</span></label>
        </div>
        <div class="field-error" id="programs-error" hidden></div>
      </div>

      <div class="row">
        <div class="field">
          <label for="balanceMin">Min budget <span class="hint">in points</span></label>
          <input type="text" id="balanceMin" name="balanceMin" placeholder="e.g. 50,000"
                 inputmode="numeric" autocomplete="off" required />
        </div>
        <div class="field">
          <label for="balanceMax">Max budget <span class="hint">in points</span></label>
          <input type="text" id="balanceMax" name="balanceMax" placeholder="e.g. 150,000"
                 inputmode="numeric" autocomplete="off" required />
        </div>
      </div>
      <div class="field-error" id="balance-error" style="margin-top:-12px;margin-bottom:18px;" hidden></div>

      <div class="row">
        <div class="field">
          <label for="origin">From <span class="hint">airport code</span></label>
          <input type="text" id="origin" name="origin" placeholder="JFK"
                 maxlength="23" autocapitalize="characters" required />
          <div class="field-error" id="origin-error" hidden></div>
        </div>
        <div class="field">
          <label for="destination">To <span class="hint">airport code</span></label>
          <input type="text" id="destination" name="destination" placeholder="LHR"
                 maxlength="23" autocapitalize="characters" required />
          <div class="field-error" id="destination-error" hidden></div>
        </div>
      </div>

      <div class="field">
        <label class="check-inline">
          <input type="checkbox" id="surprise" />
          <span>✨ Surprise me — search every destination from my origin</span>
        </label>
      </div>

      <div class="field">
        <label>Departure date <span class="hint">future dates only</span></label>
        <div class="datepicker" id="datepicker">
          <div class="dp-trigger" id="dp-trigger" role="button" tabindex="0"
               aria-haspopup="dialog" aria-expanded="false">
            <svg class="dp-cal-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="5" width="18" height="16" rx="2"></rect>
              <line x1="3" y1="10" x2="21" y2="10"></line>
              <line x1="8" y1="3" x2="8" y2="7"></line>
              <line x1="16" y1="3" x2="16" y2="7"></line>
            </svg>
            <span class="dp-text placeholder" id="dp-text">Select a departure date…</span>
            <button type="button" class="dp-clear" id="dp-clear" aria-label="Clear date" hidden>×</button>
          </div>
          <div class="dp-panel" id="dp-panel" role="dialog" aria-label="Choose departure date" hidden>
            <div class="dp-head">
              <button type="button" class="dp-nav" id="dp-prev" aria-label="Previous month">‹</button>
              <span class="dp-month" id="dp-month"></span>
              <button type="button" class="dp-nav" id="dp-next" aria-label="Next month">›</button>
            </div>
            <div class="dp-dow">
              <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div class="dp-grid" id="dp-grid"></div>
            <div class="dp-flex">
              <span class="dp-flex-label">Date flexibility — search a window around this date</span>
              <div class="dp-flex-row" id="dp-flex-row"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Cabin <span class="hint">pick one or more</span></label>
        <div class="chips" id="cabins-chips">
          <label class="chip"><input type="checkbox" name="cabins" value="economy" /><span class="chip-label">Economy</span></label>
          <label class="chip"><input type="checkbox" name="cabins" value="premium" /><span class="chip-label">Premium economy</span></label>
          <label class="chip"><input type="checkbox" name="cabins" value="business" /><span class="chip-label">Business</span></label>
          <label class="chip"><input type="checkbox" name="cabins" value="first" /><span class="chip-label">First</span></label>
        </div>
        <div class="field-error" id="cabins-error" hidden></div>
      </div>

      <div class="field">
        <label>Need help booking anything else? <span class="hint">optional</span></label>
        <div class="chips" id="help-chips">
          <label class="chip"><input type="checkbox" name="helpWith" value="hotel" /><span class="chip-label">Hotel</span></label>
          <label class="chip"><input type="checkbox" name="helpWith" value="car" /><span class="chip-label">Car rental</span></label>
          <label class="chip"><input type="checkbox" name="helpWith" value="activities" /><span class="chip-label">Activities</span></label>
          <label class="chip"><input type="checkbox" name="helpWith" value="insurance" /><span class="chip-label">Travel insurance</span></label>
        </div>
      </div>

      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Erickson"
               maxlength="80" autocomplete="given-name" required />
      </div>

      <div class="field">
        <label for="email">Your email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>

      <div class="hp" aria-hidden="true">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" tabindex="-1" autocomplete="off" />
      </div>

      <button type="submit" id="submit-btn">Find my options</button>

      <div class="message" id="message" hidden></div>
    </form>

    <footer>© myjetset.life</footer>
  </div>

  <script>
    (function () {
      var form = document.getElementById('search-form');
      var btn = document.getElementById('submit-btn');
      var msg = document.getElementById('message');

      function validateAirport(input, errEl, strict) {
        var raw = input.value.replace(/\s+/g, '').toUpperCase();
        if (raw === '') {
          if (strict) {
            errEl.textContent = 'Please enter an airport code.';
            errEl.hidden = false;
            return false;
          }
          errEl.hidden = true;
          return true;
        }
        var parts = raw.split(',');
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i];
          if (!/^[A-Z]{3}$/.test(p)) {
            // Suppress error while the user is still typing this code
            if (!strict && /^[A-Z]{0,2}$/.test(p)) {
              errEl.hidden = true;
              return false;
            }
            errEl.textContent = 'Use a 3-letter airport code (e.g. JFK).';
            errEl.hidden = false;
            return false;
          }
        }
        for (var j = 0; j < parts.length; j++) {
          if (!AIRPORT_CODES.has(parts[j])) {
            errEl.textContent = '"' + parts[j] + '" isn’t a recognized airport code.';
            errEl.hidden = false;
            return false;
          }
        }
        errEl.hidden = true;
        return true;
      }

      ['origin', 'destination'].forEach(function (id) {
        var input = document.getElementById(id);
        var err = document.getElementById(id + '-error');
        input.addEventListener('input', function () { validateAirport(input, err, false); });
        input.addEventListener('blur', function () { validateAirport(input, err, true); });
      });

      // ---- Surprise me toggle (disables destination) ------------------------
      var surpriseCheckbox = document.getElementById('surprise');
      surpriseCheckbox.addEventListener('change', function () {
        var s = surpriseCheckbox.checked;
        var destInput = document.getElementById('destination');
        var destErrEl = document.getElementById('destination-error');
        destInput.disabled = s;
        if (s) {
          destInput.value = '';
          destErrEl.hidden = true;
        }
      });

      // ---- Points budget (min/max, in 1,000s up to 500,000) -----------------
      var MAX_POINTS = 500000;
      var balMin = document.getElementById('balanceMin');
      var balMax = document.getElementById('balanceMax');
      var balErr = document.getElementById('balance-error');

      function parsePoints(str) {
        var n = parseInt(String(str).replace(/[^\d]/g, ''), 10);
        return isNaN(n) ? null : n;
      }
      function formatPoints(n) {
        return n == null ? '' : n.toLocaleString('en-US');
      }
      function formatOnInput(input) {
        var raw = parsePoints(input.value);
        if (raw == null) { input.value = ''; return; }
        if (raw > MAX_POINTS) raw = MAX_POINTS;
        input.value = formatPoints(raw);
      }
      function validateBalance(strict) {
        var min = parsePoints(balMin.value);
        var max = parsePoints(balMax.value);
        if (min == null && max == null) {
          if (strict) {
            balErr.textContent = 'Enter your min and max points budget.';
            balErr.hidden = false;
            return false;
          }
          balErr.hidden = true;
          return true;
        }
        if (min == null || max == null) {
          if (strict) {
            balErr.textContent = 'Enter both min and max points.';
            balErr.hidden = false;
            return false;
          }
          balErr.hidden = true;
          return false;
        }
        if (max > MAX_POINTS) {
          balErr.textContent = 'Max allowed is 500,000 points.';
          balErr.hidden = false;
          return false;
        }
        if (min >= max) {
          balErr.textContent = 'Min must be less than max.';
          balErr.hidden = false;
          return false;
        }
        balErr.hidden = true;
        return true;
      }
      [balMin, balMax].forEach(function (input) {
        input.addEventListener('input', function () {
          formatOnInput(input);
          if (!balErr.hidden) validateBalance(false);
        });
        input.addEventListener('blur', function () { validateBalance(true); });
      });

      // ---- Mileage programs (multi-select, max 3) ---------------------------
      var MAX_PROGRAMS = 3;
      var programInputs = document.querySelectorAll('input[name="programs"]');
      var programsErr = document.getElementById('programs-error');

      // Airline IATA codes for program logos. Keys mirror the input values.
      var PROGRAM_AIRLINE_IATA = {
        aeroplan: 'AC', aeromexico: 'AM', alaska: 'AS', american: 'AA',
        azul: 'AD', british: 'BA', delta: 'DL', etihad: 'EY', finnair: 'AY',
        flyingblue: 'AF', jetblue: 'B6', qantas: 'QF', qatar: 'QR',
        saudia: 'SV', smiles: 'G3', united: 'UA', velocity: 'VA',
        virginatlantic: 'VS'
      };
      programInputs.forEach(function (i) {
        var iata = PROGRAM_AIRLINE_IATA[i.value];
        if (!iata) return;
        var label = i.parentNode.querySelector('.chip-label');
        if (!label) return;
        var img = document.createElement('img');
        img.src = 'https://images.kiwi.com/airlines/64x64/' + iata + '.png';
        img.alt = '';
        img.loading = 'lazy';
        img.style.cssText =
          'width:18px;height:18px;margin-right:8px;vertical-align:middle;' +
          'border-radius:3px;background:#fff;';
        label.insertBefore(img, label.firstChild);
      });

      function updateProgramLimit() {
        var checkedCount = 0;
        programInputs.forEach(function (i) { if (i.checked) checkedCount++; });
        programInputs.forEach(function (i) {
          i.disabled = (!i.checked && checkedCount >= MAX_PROGRAMS);
        });
        if (checkedCount > 0) programsErr.hidden = true;
      }
      programInputs.forEach(function (i) {
        i.addEventListener('change', updateProgramLimit);
      });

      // ---- Cabins (multi-select) --------------------------------------------
      var cabinInputs = document.querySelectorAll('input[name="cabins"]');
      var cabinsErr = document.getElementById('cabins-error');
      cabinInputs.forEach(function (i) {
        i.addEventListener('change', function () {
          if (Array.from(cabinInputs).some(function (c) { return c.checked; })) {
            cabinsErr.hidden = true;
          }
        });
      });

      // ---- Date picker ------------------------------------------------------
      var FLEX_OPTIONS = [1, 3, 7, 14];   // "± N days" — up to 14
      var DEFAULT_FLEX = 7;
      var MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];

      var dp = {
        wrap: document.getElementById('datepicker'),
        trigger: document.getElementById('dp-trigger'),
        text: document.getElementById('dp-text'),
        clear: document.getElementById('dp-clear'),
        panel: document.getElementById('dp-panel'),
        monthLabel: document.getElementById('dp-month'),
        grid: document.getElementById('dp-grid'),
        prev: document.getElementById('dp-prev'),
        next: document.getElementById('dp-next'),
        flexRow: document.getElementById('dp-flex-row')
      };

      function atMidnight(d) {
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
      }
      function addDays(d, n) {
        return new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
      }
      function iso(d) {
        return d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      }
      function sameDay(a, b) {
        return !!a && !!b && a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }
      function prettyDate(d) {
        return MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }

      var today = atMidnight(new Date());
      var selectedDate = null;
      var flex = DEFAULT_FLEX;
      var viewYear = today.getFullYear();
      var viewMonth = today.getMonth();

      function renderTrigger() {
        if (selectedDate) {
          dp.text.textContent = prettyDate(selectedDate) + '  ·  ± ' + flex + ' days';
          dp.text.classList.remove('placeholder');
          dp.clear.hidden = false;
        } else {
          dp.text.textContent = 'Select a departure date…';
          dp.text.classList.add('placeholder');
          dp.clear.hidden = true;
        }
      }

      function renderFlex() {
        dp.flexRow.innerHTML = '';
        FLEX_OPTIONS.forEach(function (n) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'dp-flex-btn' + (n === flex ? ' active' : '');
          b.textContent = '± ' + n + 'd';
          b.addEventListener('click', function (e) {
            e.stopPropagation();
            flex = n;
            renderFlex();
            renderTrigger();
          });
          dp.flexRow.appendChild(b);
        });
      }

      function renderCalendar() {
        dp.monthLabel.textContent = MONTHS[viewMonth] + ' ' + viewYear;
        dp.prev.disabled = (viewYear === today.getFullYear() &&
          viewMonth === today.getMonth());

        dp.grid.innerHTML = '';
        var first = new Date(viewYear, viewMonth, 1);
        var start = addDays(first, -first.getDay()); // rewind to Sunday
        for (var i = 0; i < 42; i++) {
          var cell = addDays(start, i);
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'dp-day';
          b.textContent = cell.getDate();
          if (cell.getMonth() !== viewMonth) b.classList.add('muted');
          if (sameDay(cell, today)) b.classList.add('today');
          if (sameDay(cell, selectedDate)) b.classList.add('selected');
          if (cell < today) {
            b.disabled = true;
          } else {
            (function (dateVal) {
              b.addEventListener('click', function (e) {
                e.stopPropagation();
                selectedDate = dateVal;
                viewYear = dateVal.getFullYear();
                viewMonth = dateVal.getMonth();
                renderCalendar();
                renderTrigger();
              });
            })(cell);
          }
          dp.grid.appendChild(b);
        }
      }

      function openPanel() {
        if (selectedDate) {
          viewYear = selectedDate.getFullYear();
          viewMonth = selectedDate.getMonth();
        }
        renderCalendar();
        dp.panel.hidden = false;
        dp.trigger.classList.add('open');
        dp.trigger.setAttribute('aria-expanded', 'true');
      }
      function closePanel() {
        dp.panel.hidden = true;
        dp.trigger.classList.remove('open');
        dp.trigger.setAttribute('aria-expanded', 'false');
      }
      function togglePanel() {
        if (dp.panel.hidden) openPanel(); else closePanel();
      }

      dp.trigger.addEventListener('click', function () { togglePanel(); });
      dp.trigger.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePanel(); }
      });
      dp.clear.addEventListener('click', function (e) {
        e.stopPropagation();
        selectedDate = null;
        renderTrigger();
        if (!dp.panel.hidden) renderCalendar();
      });
      dp.prev.addEventListener('click', function (e) {
        e.stopPropagation();
        if (dp.prev.disabled) return;
        viewMonth--;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        renderCalendar();
      });
      dp.next.addEventListener('click', function (e) {
        e.stopPropagation();
        viewMonth++;
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        renderCalendar();
      });
      document.addEventListener('click', function (e) {
        if (!dp.panel.hidden && !dp.wrap.contains(e.target)) closePanel();
      });

      renderFlex();
      renderTrigger();

      // ---- Submit -----------------------------------------------------------
      function show(kind, text) {
        msg.className = 'message ' + kind;
        msg.textContent = text;
        msg.hidden = false;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        msg.hidden = true;

        var surprise = surpriseCheckbox.checked;

        if (!form.name.value.trim() || !form.origin.value.trim() ||
            (!surprise && !form.destination.value.trim()) ||
            !form.email.value.trim()) {
          show('err', 'Please fill in every field before searching.');
          return;
        }

        if (!validateBalance(true)) return;
        var balanceMinVal = parsePoints(balMin.value);
        var balanceMaxVal = parsePoints(balMax.value);

        var selectedPrograms = [];
        programInputs.forEach(function (i) { if (i.checked) selectedPrograms.push(i.value); });
        if (selectedPrograms.length === 0) {
          programsErr.textContent = 'Pick at least one mileage program.';
          programsErr.hidden = false;
          return;
        }

        var selectedCabins = [];
        cabinInputs.forEach(function (i) { if (i.checked) selectedCabins.push(i.value); });
        if (selectedCabins.length === 0) {
          cabinsErr.textContent = 'Pick at least one cabin.';
          cabinsErr.hidden = false;
          return;
        }

        var originOk = validateAirport(form.origin,
          document.getElementById('origin-error'), true);
        var destOk = surprise ? true : validateAirport(form.destination,
          document.getElementById('destination-error'), true);
        if (!originOk || !destOk) {
          (originOk ? form.destination : form.origin).focus();
          return;
        }

        if (!selectedDate) {
          show('err', 'Please choose a departure date.');
          return;
        }

        // Search window: [date - flex, date + flex], start clamped to today
        var startD = addDays(selectedDate, -flex);
        if (startD < today) startD = today;
        var endD = addDays(selectedDate, flex);

        var payload = {
          name: form.name.value.trim(),
          programs: selectedPrograms,
          balanceMin: balanceMinVal,
          balanceMax: balanceMaxVal,
          origin: form.origin.value.replace(/\s+/g, '').toUpperCase(),
          destination: surprise ? '' : form.destination.value.replace(/\s+/g, '').toUpperCase(),
          surprise: surprise,
          startDate: iso(startD),
          endDate: iso(endD),
          cabins: selectedCabins,
          helpWith: Array.from(document.querySelectorAll('input[name="helpWith"]:checked')).map(function (i) { return i.value; }),
          email: form.email.value.trim(),
          company: form.company.value
        };

        btn.disabled = true;
        btn.textContent = 'Searching…';

        fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function (res) {
            return res.json().then(function (body) {
              return { ok: res.ok, body: body };
            });
          })
          .then(function (r) {
            if (!r.ok) {
              show('err', (r.body && r.body.error) || 'Something went wrong. Please try again.');
              btn.disabled = false;
              btn.textContent = 'Find my options';
              return;
            }
            form.querySelectorAll('input, select, button').forEach(function (el) {
              el.disabled = true;
            });
            if (r.body.count > 0) {
              show('ok', 'We found ' + r.body.count + ' option' +
                (r.body.count > 1 ? 's' : '') +
                ' you can afford. Check your inbox — they’re on the way ✈');
            } else {
              show('ok', 'No award space matched right now. We’ve emailed you the ' +
                'details and we’ll keep an eye out. ✈');
            }
          })
          .catch(function () {
            show('err', 'Network error. Please check your connection and try again.');
            btn.disabled = false;
            btn.textContent = 'Find my options';
          });
      });
    })();
  </script>
</body>
</html>
