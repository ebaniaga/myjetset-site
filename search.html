<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>myjetset — Find award flights with your points</title>
<meta name="description" content="Tell us your points and where you want to go. We'll email you award flight options." />
<style>
  :root {
    --ink: #0b1d2a;
    --sky-top: #0a1a2f;
    --sky-mid: #1f3b5c;
    --sky-low: #6ea8c9;
    --ice: #e8f3fb;
    --ice-shadow: #b9d6e8;
    --accent: #ffd27a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    color: var(--ice);
    background: var(--sky-top);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(
      to bottom,
      var(--sky-top) 0%,
      var(--sky-mid) 55%,
      var(--sky-low) 100%
    );
    padding: 6vh 20px 8vh;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .brand {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand .dot { color: var(--accent); }

  .lead {
    margin-top: 0.9rem;
    font-size: clamp(1rem, 2.4vw, 1.15rem);
    font-weight: 300;
    opacity: 0.9;
    line-height: 1.45;
  }

  .card {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.16);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 28px;
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 6px;
  }

  .hint {
    font-size: 0.78rem;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    opacity: 0.6;
  }

  input, select {
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    color: var(--ice);
    padding: 12px 14px;
    font-size: 0.98rem;
    font-family: inherit;
    outline: 0;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.14);
  }

  input::placeholder { color: rgba(232, 243, 251, 0.45); }

  select option { background: var(--sky-mid); color: var(--ice); }

  .row {
    display: flex;
    gap: 14px;
  }
  .row .field { flex: 1; margin-bottom: 18px; }

  .hp {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }

  #submit-btn {
    width: 100%;
    background: var(--accent);
    color: var(--ink);
    border: 0;
    border-radius: 999px;
    padding: 14px 22px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #submit-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(255, 210, 122, 0.35);
  }

  #submit-btn:disabled { opacity: 0.6; cursor: default; }

  /* ---- Date picker ---- */
  .datepicker { position: relative; }

  .dp-trigger {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    color: var(--ice);
    font-size: 0.98rem;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .dp-trigger:hover, .dp-trigger.open {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.14);
  }
  .dp-trigger:focus-visible { border-color: var(--accent); outline: 0; }

  .dp-cal-icon {
    width: 18px; height: 18px;
    flex-shrink: 0;
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
  }
  .dp-text { flex: 1; text-align: left; }
  .dp-text.placeholder { color: rgba(232, 243, 251, 0.45); }

  .dp-clear {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: var(--ice);
    font-size: 1.05rem;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
  }
  .dp-clear:hover { background: rgba(255, 255, 255, 0.28); }
  .dp-clear[hidden] { display: none; }

  .dp-panel {
    position: absolute;
    z-index: 20;
    top: calc(100% + 8px);
    left: 0;
    width: 330px;
    max-width: 100%;
    background: #0e2138;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
  }
  .dp-panel[hidden] { display: none; }

  .dp-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .dp-month { font-weight: 600; font-size: 0.98rem; }

  .dp-nav {
    width: 32px; height: 32px;
    padding: 0;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--ice);
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .dp-nav:hover:not(:disabled) { background: rgba(255, 255, 255, 0.12); }
  .dp-nav:disabled { opacity: 0.25; cursor: default; }

  .dp-dow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .dp-dow span {
    text-align: center;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    opacity: 0.5;
    padding: 4px 0;
  }

  .dp-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .dp-day {
    aspect-ratio: 1 / 1;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: transparent;
    color: var(--ice);
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .dp-day:hover:not(:disabled):not(.selected) { background: rgba(255, 255, 255, 0.12); }
  .dp-day.muted { color: rgba(232, 243, 251, 0.3); }
  .dp-day:disabled { color: rgba(232, 243, 251, 0.18); cursor: default; }
  .dp-day.today:not(.selected) { box-shadow: inset 0 0 0 1px var(--accent); }
  .dp-day.selected {
    background: var(--accent);
    color: var(--ink);
    font-weight: 700;
  }

  .dp-flex {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
  }
  .dp-flex-label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.6;
    margin-bottom: 8px;
  }
  .dp-flex-row { display: flex; gap: 8px; }
  .dp-flex-btn {
    flex: 1;
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 999px;
    background: transparent;
    color: var(--ice);
    padding: 8px 4px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .dp-flex-btn:hover { border-color: var(--accent); }
  .dp-flex-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--ink);
    font-weight: 700;
  }

  .message {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.45;
  }
  .message[hidden] { display: none; }
  .message.ok {
    background: rgba(120, 210, 170, 0.15);
    border: 1px solid rgba(120, 210, 170, 0.4);
    color: #d6f6e8;
  }
  .message.err {
    background: rgba(230, 130, 130, 0.15);
    border: 1px solid rgba(230, 130, 130, 0.4);
    color: #f6dada;
  }

  footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.78rem;
    opacity: 0.5;
  }

  @media (max-width: 460px) {
    .row { flex-direction: column; gap: 0; }
    .card { padding: 22px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="brand">myjetset<span class="dot">.</span>life</h1>
      <p class="lead">
        Tell us how many points you have and where you'd like to go.
        We'll search award availability and email you the options.
      </p>
    </header>

    <form class="card" id="search-form" novalidate>
      <div class="field">
        <label for="program">Mileage program</label>
        <select id="program" name="program" required>
          <option value="" disabled selected>Select your program…</option>
          <option value="aeroplan">Air Canada Aeroplan</option>
          <option value="aeromexico">Aeroméxico Club Premier</option>
          <option value="alaska">Alaska Mileage Plan</option>
          <option value="american">American AAdvantage</option>
          <option value="azul">Azul TudoAzul</option>
          <option value="british">British Airways Club</option>
          <option value="delta">Delta SkyMiles</option>
          <option value="etihad">Etihad Guest</option>
          <option value="finnair">Finnair Plus</option>
          <option value="flyingblue">Air France-KLM Flying Blue</option>
          <option value="jetblue">JetBlue TrueBlue</option>
          <option value="qantas">Qantas Frequent Flyer</option>
          <option value="qatar">Qatar Privilege Club</option>
          <option value="saudia">Saudia AlFursan</option>
          <option value="smiles">GOL Smiles</option>
          <option value="united">United MileagePlus</option>
          <option value="velocity">Virgin Australia Velocity</option>
          <option value="virginatlantic">Virgin Atlantic Flying Club</option>
        </select>
      </div>

      <div class="field">
        <label for="balance">Points balance</label>
        <input type="number" id="balance" name="balance" min="1000" step="1000"
               placeholder="e.g. 120000" required inputmode="numeric" />
      </div>

      <div class="row">
        <div class="field">
          <label for="origin">From <span class="hint">airport code</span></label>
          <input type="text" id="origin" name="origin" placeholder="JFK"
                 maxlength="23" autocapitalize="characters" required />
        </div>
        <div class="field">
          <label for="destination">To <span class="hint">airport code</span></label>
          <input type="text" id="destination" name="destination" placeholder="LHR"
                 maxlength="23" autocapitalize="characters" required />
        </div>
      </div>

      <div class="field">
        <label>Departure date <span class="hint">future dates only</span></label>
        <div class="datepicker" id="datepicker">
          <div class="dp-trigger" id="dp-trigger" role="button" tabindex="0"
               aria-haspopup="dialog" aria-expanded="false">
            <svg class="dp-cal-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="5" width="18" height="16" rx="2"></rect>
              <line x1="3" y1="10" x2="21" y2="10"></line>
              <line x1="8" y1="3" x2="8" y2="7"></line>
              <line x1="16" y1="3" x2="16" y2="7"></line>
            </svg>
            <span class="dp-text placeholder" id="dp-text">Select a departure date…</span>
            <button type="button" class="dp-clear" id="dp-clear" aria-label="Clear date" hidden>×</button>
          </div>
          <div class="dp-panel" id="dp-panel" role="dialog" aria-label="Choose departure date" hidden>
            <div class="dp-head">
              <button type="button" class="dp-nav" id="dp-prev" aria-label="Previous month">‹</button>
              <span class="dp-month" id="dp-month"></span>
              <button type="button" class="dp-nav" id="dp-next" aria-label="Next month">›</button>
            </div>
            <div class="dp-dow">
              <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div class="dp-grid" id="dp-grid"></div>
            <div class="dp-flex">
              <span class="dp-flex-label">Date flexibility — search a window around this date</span>
              <div class="dp-flex-row" id="dp-flex-row"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="cabin">Cabin</label>
        <select id="cabin" name="cabin">
          <option value="any" selected>Any cabin</option>
          <option value="economy">Economy</option>
          <option value="premium">Premium economy</option>
          <option value="business">Business</option>
          <option value="first">First</option>
        </select>
      </div>

      <div class="field">
        <label for="email">Your email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>

      <div class="hp" aria-hidden="true">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" tabindex="-1" autocomplete="off" />
      </div>

      <button type="submit" id="submit-btn">Find my options</button>

      <div class="message" id="message" hidden></div>
    </form>

    <footer>© myjetset.life — award availability provided by seats.aero</footer>
  </div>

  <script>
    (function () {
      var form = document.getElementById('search-form');
      var btn = document.getElementById('submit-btn');
      var msg = document.getElementById('message');

      // ---- Date picker ------------------------------------------------------
      var FLEX_OPTIONS = [1, 3, 7, 14];   // "± N days" — up to 14
      var DEFAULT_FLEX = 7;
      var MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];

      var dp = {
        wrap: document.getElementById('datepicker'),
        trigger: document.getElementById('dp-trigger'),
        text: document.getElementById('dp-text'),
        clear: document.getElementById('dp-clear'),
        panel: document.getElementById('dp-panel'),
        monthLabel: document.getElementById('dp-month'),
        grid: document.getElementById('dp-grid'),
        prev: document.getElementById('dp-prev'),
        next: document.getElementById('dp-next'),
        flexRow: document.getElementById('dp-flex-row')
      };

      function atMidnight(d) {
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
      }
      function addDays(d, n) {
        return new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
      }
      function iso(d) {
        return d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      }
      function sameDay(a, b) {
        return !!a && !!b && a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }
      function prettyDate(d) {
        return MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }

      var today = atMidnight(new Date());
      var selectedDate = null;
      var flex = DEFAULT_FLEX;
      var viewYear = today.getFullYear();
      var viewMonth = today.getMonth();

      function renderTrigger() {
        if (selectedDate) {
          dp.text.textContent = prettyDate(selectedDate) + '  ·  ± ' + flex + ' days';
          dp.text.classList.remove('placeholder');
          dp.clear.hidden = false;
        } else {
          dp.text.textContent = 'Select a departure date…';
          dp.text.classList.add('placeholder');
          dp.clear.hidden = true;
        }
      }

      function renderFlex() {
        dp.flexRow.innerHTML = '';
        FLEX_OPTIONS.forEach(function (n) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'dp-flex-btn' + (n === flex ? ' active' : '');
          b.textContent = '± ' + n + 'd';
          b.addEventListener('click', function (e) {
            e.stopPropagation();
            flex = n;
            renderFlex();
            renderTrigger();
          });
          dp.flexRow.appendChild(b);
        });
      }

      function renderCalendar() {
        dp.monthLabel.textContent = MONTHS[viewMonth] + ' ' + viewYear;
        dp.prev.disabled = (viewYear === today.getFullYear() &&
          viewMonth === today.getMonth());

        dp.grid.innerHTML = '';
        var first = new Date(viewYear, viewMonth, 1);
        var start = addDays(first, -first.getDay()); // rewind to Sunday
        for (var i = 0; i < 42; i++) {
          var cell = addDays(start, i);
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'dp-day';
          b.textContent = cell.getDate();
          if (cell.getMonth() !== viewMonth) b.classList.add('muted');
          if (sameDay(cell, today)) b.classList.add('today');
          if (sameDay(cell, selectedDate)) b.classList.add('selected');
          if (cell < today) {
            b.disabled = true;
          } else {
            (function (dateVal) {
              b.addEventListener('click', function (e) {
                e.stopPropagation();
                selectedDate = dateVal;
                viewYear = dateVal.getFullYear();
                viewMonth = dateVal.getMonth();
                renderCalendar();
                renderTrigger();
              });
            })(cell);
          }
          dp.grid.appendChild(b);
        }
      }

      function openPanel() {
        if (selectedDate) {
          viewYear = selectedDate.getFullYear();
          viewMonth = selectedDate.getMonth();
        }
        renderCalendar();
        dp.panel.hidden = false;
        dp.trigger.classList.add('open');
        dp.trigger.setAttribute('aria-expanded', 'true');
      }
      function closePanel() {
        dp.panel.hidden = true;
        dp.trigger.classList.remove('open');
        dp.trigger.setAttribute('aria-expanded', 'false');
      }
      function togglePanel() {
        if (dp.panel.hidden) openPanel(); else closePanel();
      }

      dp.trigger.addEventListener('click', function () { togglePanel(); });
      dp.trigger.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePanel(); }
      });
      dp.clear.addEventListener('click', function (e) {
        e.stopPropagation();
        selectedDate = null;
        renderTrigger();
        if (!dp.panel.hidden) renderCalendar();
      });
      dp.prev.addEventListener('click', function (e) {
        e.stopPropagation();
        if (dp.prev.disabled) return;
        viewMonth--;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        renderCalendar();
      });
      dp.next.addEventListener('click', function (e) {
        e.stopPropagation();
        viewMonth++;
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        renderCalendar();
      });
      document.addEventListener('click', function (e) {
        if (!dp.panel.hidden && !dp.wrap.contains(e.target)) closePanel();
      });

      renderFlex();
      renderTrigger();

      // ---- Submit -----------------------------------------------------------
      function show(kind, text) {
        msg.className = 'message ' + kind;
        msg.textContent = text;
        msg.hidden = false;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        msg.hidden = true;

        if (!form.program.value || !form.balance.value ||
            !form.origin.value.trim() || !form.destination.value.trim() ||
            !form.email.value.trim()) {
          show('err', 'Please fill in every field before searching.');
          return;
        }

        var airportRe = /^[A-Z]{3}(,[A-Z]{3})*$/;
        if (!airportRe.test(form.origin.value.replace(/\s+/g, '').toUpperCase())) {
          show('err', 'The "From" field needs a 3-letter airport code (e.g. JFK).');
          return;
        }
        if (!airportRe.test(form.destination.value.replace(/\s+/g, '').toUpperCase())) {
          show('err', 'The "To" field needs a 3-letter airport code (e.g. LHR).');
          return;
        }

        if (!selectedDate) {
          show('err', 'Please choose a departure date.');
          return;
        }

        // Search window: [date - flex, date + flex], start clamped to today
        var startD = addDays(selectedDate, -flex);
        if (startD < today) startD = today;
        var endD = addDays(selectedDate, flex);

        var payload = {
          program: form.program.value,
          balance: form.balance.value,
          origin: form.origin.value.replace(/\s+/g, '').toUpperCase(),
          destination: form.destination.value.replace(/\s+/g, '').toUpperCase(),
          startDate: iso(startD),
          endDate: iso(endD),
          cabin: form.cabin.value,
          email: form.email.value.trim(),
          company: form.company.value
        };

        btn.disabled = true;
        btn.textContent = 'Searching…';

        fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function (res) {
            return res.json().then(function (body) {
              return { ok: res.ok, body: body };
            });
          })
          .then(function (r) {
            if (!r.ok) {
              show('err', (r.body && r.body.error) || 'Something went wrong. Please try again.');
              btn.disabled = false;
              btn.textContent = 'Find my options';
              return;
            }
            form.querySelectorAll('input, select, button').forEach(function (el) {
              el.disabled = true;
            });
            if (r.body.count > 0) {
              show('ok', 'We found ' + r.body.count + ' option' +
                (r.body.count > 1 ? 's' : '') +
                ' you can afford. Check your inbox — they’re on the way ✈');
            } else {
              show('ok', 'No award space matched right now. We’ve emailed you the ' +
                'details and we’ll keep an eye out. ✈');
            }
          })
          .catch(function () {
            show('err', 'Network error. Please check your connection and try again.');
            btn.disabled = false;
            btn.textContent = 'Find my options';
          });
      });
    })();
  </script>
</body>
</html>
