<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>myjetset — Coming Soon</title>
<meta name="description" content="myjetset.life — a new way to plan and live the journey. Launching soon." />
<style>
  :root {
    --ink: #0b1d2a;
    --sky-top: #0a1a2f;
    --sky-mid: #1f3b5c;
    --sky-low: #6ea8c9;
    --ice: #e8f3fb;
    --ice-shadow: #b9d6e8;
    --accent: #ffd27a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    color: var(--ice);
    background: var(--sky-top);
    -webkit-font-smoothing: antialiased;
  }

  .scene {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    background: linear-gradient(
      to bottom,
      var(--sky-top) 0%,
      var(--sky-mid) 45%,
      var(--sky-low) 75%,
      #cfe6f3 100%
    );
  }

  .stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, #fff, transparent 50%),
      radial-gradient(1px 1px at 28% 9%, #fff, transparent 50%),
      radial-gradient(1.5px 1.5px at 44% 22%, #fff, transparent 50%),
      radial-gradient(1px 1px at 67% 12%, #fff, transparent 50%),
      radial-gradient(1px 1px at 81% 26%, #fff, transparent 50%),
      radial-gradient(1px 1px at 92% 8%, #fff, transparent 50%),
      radial-gradient(1px 1px at 55% 5%, #fff, transparent 50%);
    opacity: 0.85;
    pointer-events: none;
  }

  .aurora {
    position: absolute;
    top: 5%;
    left: -10%;
    right: -10%;
    height: 40%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(90, 220, 180, 0.25), transparent 60%),
      radial-gradient(ellipse at 70% 40%, rgba(140, 120, 220, 0.22), transparent 65%),
      radial-gradient(ellipse at 50% 60%, rgba(80, 180, 230, 0.18), transparent 70%);
    filter: blur(8px);
    animation: drift 18s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes drift {
    from { transform: translateX(-3%) translateY(0); opacity: 0.85; }
    to   { transform: translateX(3%) translateY(-2%); opacity: 1; }
  }

  .moon {
    position: absolute;
    top: 8%;
    right: 12%;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffbe8, #d9d4b8 70%, #a89e7c);
    box-shadow:
      0 0 30px rgba(255, 250, 220, 0.45),
      0 0 80px rgba(255, 250, 220, 0.25);
  }

  /* Antarctica landscape */
  .landscape {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
  }

  .landscape svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    padding: 12vh 24px 0;
    text-align: center;
  }

  .brand {
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .brand .dot { color: var(--accent); }

  .tagline {
    font-size: clamp(1rem, 2vw, 1.25rem);
    font-weight: 400;
    opacity: 0.85;
    margin-bottom: 2.5rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .hero {
    font-size: clamp(1.6rem, 3.6vw, 2.4rem);
    font-weight: 300;
    line-height: 1.3;
    max-width: 36ch;
    margin: 0 auto 2rem;
  }

  .hero strong {
    font-weight: 600;
    color: var(--accent);
  }

  .signup {
    display: inline-flex;
    gap: 8px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(8px);
    border-radius: 999px;
    padding: 6px;
    max-width: 100%;
  }

  .signup input {
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--ice);
    padding: 10px 16px;
    font-size: 0.95rem;
    min-width: 220px;
    font-family: inherit;
  }

  .signup input::placeholder { color: rgba(232, 243, 251, 0.6); }

  .signup button {
    background: var(--accent);
    color: var(--ink);
    border: 0;
    border-radius: 999px;
    padding: 10px 22px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .signup button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(255, 210, 122, 0.35);
  }

  .signup button:disabled {
    opacity: 0.7;
    cursor: default;
    transform: none;
    box-shadow: none;
  }

  .signup-message {
    font-size: 1rem;
    color: var(--accent);
    margin-top: 1.5rem;
    letter-spacing: 0.02em;
    font-weight: 500;
  }

  .signup-message[hidden] { display: none; }

  .tool-link {
    display: inline-block;
    margin-top: 1.6rem;
    padding: 12px 26px;
    border: 1px solid var(--accent);
    border-radius: 999px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }

  .tool-link:hover {
    background: var(--accent);
    color: var(--ink);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(255, 210, 122, 0.35);
  }

  footer {
    position: absolute;
    bottom: 16px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.8rem;
    color: var(--ink);
    opacity: 0.5;
    z-index: 2;
  }

  @media (max-width: 520px) {
    .signup { flex-direction: column; width: 100%; max-width: 320px; }
    .signup input { width: 100%; }
    .signup button { width: 100%; }
    .moon { width: 60px; height: 60px; top: 6%; right: 8%; }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="stars" aria-hidden="true"></div>
    <div class="aurora" aria-hidden="true"></div>
    <div class="moon" aria-hidden="true"></div>

    <div class="landscape" aria-hidden="true">
      <svg viewBox="0 0 1200 600" preserveAspectRatio="xMidYMax slice">
        <!-- Distant mountains -->
        <polygon points="0,420 180,260 320,360 460,220 620,340 760,240 900,330 1060,250 1200,360 1200,600 0,600"
                 fill="#5d88a8" opacity="0.7"/>
        <!-- Snow caps on distant mountains -->
        <polygon points="180,260 215,290 245,275 270,300 320,360 290,330 250,320 215,310"
                 fill="#e8f3fb" opacity="0.85"/>
        <polygon points="460,220 495,255 525,240 555,265 580,255 620,340 580,310 540,300 495,290"
                 fill="#e8f3fb" opacity="0.85"/>
        <polygon points="760,240 790,275 820,260 855,285 900,330 855,300 815,290 790,285"
                 fill="#e8f3fb" opacity="0.85"/>
        <polygon points="1060,250 1095,285 1130,270 1165,295 1200,360 1160,320 1120,310 1085,300"
                 fill="#e8f3fb" opacity="0.85"/>

        <!-- Mid-range ice cliffs -->
        <polygon points="0,500 140,420 280,470 420,400 580,460 720,410 880,470 1040,420 1200,470 1200,600 0,600"
                 fill="#b9d6e8"/>

        <!-- Foreground ice shelf -->
        <path d="M0,560 C150,540 300,570 450,550 C600,530 750,560 900,545 C1050,530 1150,555 1200,545 L1200,600 L0,600 Z"
              fill="#e8f3fb"/>

        <!-- Icebergs in the water/ice plain -->
        <polygon points="120,540 170,500 220,545" fill="#ffffff" opacity="0.95"/>
        <polygon points="170,500 195,520 220,545 195,540" fill="#cfe6f3" opacity="0.7"/>

        <polygon points="780,535 840,490 900,540" fill="#ffffff" opacity="0.95"/>
        <polygon points="840,490 870,515 900,540 870,535" fill="#cfe6f3" opacity="0.7"/>

        <polygon points="980,548 1020,520 1060,550" fill="#ffffff" opacity="0.9"/>

        <!-- Tiny penguins -->
        <g transform="translate(380, 555)">
          <ellipse cx="0" cy="6" rx="6" ry="3" fill="#0b1d2a" opacity="0.3"/>
          <ellipse cx="0" cy="0" rx="4" ry="7" fill="#0b1d2a"/>
          <ellipse cx="0" cy="2" rx="2.5" ry="4" fill="#ffffff"/>
          <circle cx="0" cy="-5" r="2.5" fill="#0b1d2a"/>
          <polygon points="0,-4 2,-3 0,-2" fill="#ffd27a"/>
        </g>
        <g transform="translate(395, 558)">
          <ellipse cx="0" cy="5" rx="5" ry="2.5" fill="#0b1d2a" opacity="0.3"/>
          <ellipse cx="0" cy="0" rx="3.5" ry="6" fill="#0b1d2a"/>
          <ellipse cx="0" cy="2" rx="2" ry="3.5" fill="#ffffff"/>
          <circle cx="0" cy="-4" r="2" fill="#0b1d2a"/>
          <polygon points="0,-3.5 1.5,-2.5 0,-1.5" fill="#ffd27a"/>
        </g>
        <g transform="translate(408, 556)">
          <ellipse cx="0" cy="6" rx="6" ry="3" fill="#0b1d2a" opacity="0.3"/>
          <ellipse cx="0" cy="0" rx="4" ry="7" fill="#0b1d2a"/>
          <ellipse cx="0" cy="2" rx="2.5" ry="4" fill="#ffffff"/>
          <circle cx="0" cy="-5" r="2.5" fill="#0b1d2a"/>
          <polygon points="0,-4 2,-3 0,-2" fill="#ffd27a"/>
        </g>
      </svg>
    </div>

    <main class="content">
      <h1 class="brand">myjetset<span class="dot">.</span>life</h1>
      <p class="tagline">The journey is being charted</p>
      <p class="hero">
        Something <strong>new</strong> for the curious traveler is on its way —
        from the polar south to wherever your compass points next.
      </p>

      <form class="signup" id="signup-form"
            action="https://buttondown.com/api/emails/embed-subscribe/myjetsetlife"
            method="post">
        <input type="email" name="email" placeholder="your@email.com" required aria-label="Email address" />
        <button type="submit">Notify me</button>
      </form>
      <p class="signup-message" id="signup-message" hidden>Thanks — check your inbox to confirm ✈</p>

      <a class="tool-link" href="https://search.myjetset.life/search">
        Search award flights with your points →
      </a>
    </main>

    <footer>© myjetset.life — coming soon</footer>
  </div>

  <script>
    (function () {
      var form = document.getElementById('signup-form');
      var message = document.getElementById('signup-message');
      var input = form.querySelector('input[type="email"]');
      var button = form.querySelector('button');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!input.value) return;
        button.disabled = true;
        button.textContent = 'Sending…';
        var data = new FormData();
        data.append('email', input.value);
        fetch(form.action, { method: 'POST', body: data, mode: 'no-cors' })
          .then(function () {
            form.hidden = true;
            message.hidden = false;
          })
          .catch(function () {
            button.disabled = false;
            button.textContent = 'Try again';
          });
      });
    })();
  </script>
</body>
</html>
